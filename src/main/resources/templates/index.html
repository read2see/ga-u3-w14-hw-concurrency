<!DOCTYPE html>
<html lang="en" class="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees Data Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/shadcdn-ui@latest/dist/index.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        canvas: "#09090b",
                        panel: "#111113",
                        panelSoft: "#18181b",
                        textMain: "#fafafa",
                        textMuted: "#a1a1aa",
                        accent: "#e4e4e7"
                    },
                    boxShadow: {
                        panel: "0 24px 80px rgba(0,0,0,0.45)"
                    }
                }
            }
        };
    </script>
    <style>
        .raise-transition {
            overflow: hidden;
            white-space: nowrap;
            transition: opacity 280ms ease, max-width 280ms ease, padding 280ms ease, transform 280ms ease;
        }

        .raise-visible {
            opacity: 1;
            max-width: 18rem;
            transform: translateX(0);
        }

        .raise-hidden {
            opacity: 0;
            max-width: 0;
            padding-left: 0 !important;
            padding-right: 0 !important;
            transform: translateX(12px);
        }

        @media (min-width: 768px) {
            .desktop-row-cell {
                border-left: 1px solid transparent;
                border-right: 1px solid transparent;
                border-top: 1px solid rgba(255, 255, 255, 0.04);
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
                transition: border-color 200ms ease, background-color 200ms ease;
            }

            tbody tr:hover .desktop-row-cell {
                border-top-color: rgb(167 243 208 / 0.6);
                border-bottom-color: rgb(167 243 208 / 0.6);
            }

            tbody tr:hover .desktop-row-cell.row-edge-left {
                border-left-color: rgb(167 243 208 / 0.6);
            }

            tbody tr:hover .desktop-row-cell.row-edge-right {
                border-right-color: rgb(167 243 208 / 0.6);
            }

            .raise-column-cell {
                border-left: 1px solid rgb(220 252 231 / 0.7);
                border-right: 1px solid rgb(220 252 231 / 0.7);
            }

            thead .raise-column-cell {
                border-top: 1px solid rgb(220 252 231 / 0.7);
            }

            tbody tr:last-child .raise-column-cell {
                border-bottom: 1px solid rgb(220 252 231 / 0.7);
            }
        }
    </style>
</head>
<body class="min-h-screen bg-canvas text-textMain antialiased">
<div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,_rgba(255,255,255,0.08),_transparent_30%),linear-gradient(180deg,_rgba(255,255,255,0.02),_transparent_45%)]"></div>

<main class="mx-auto flex min-h-screen max-w-7xl flex-col px-4 py-8 sm:px-6 lg:px-8">
    <section class="overflow-hidden rounded-[28px] border border-white/10 bg-white/[0.04] shadow-panel backdrop-blur">
        <div class="border-b border-white/10 px-6 py-6 sm:px-8">
            <div class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
                <div class="max-w-2xl">
                    <h1 class="mt-4 text-3xl font-semibold tracking-tight sm:text-4xl">Employees Salary Overview</h1>
                    <p class="mt-3 text-sm leading-6 text-textMuted sm:text-base">
                        Employees' Salary Report.
                    </p>
                </div>

                <div class="flex flex-col gap-3 sm:flex-row">
                    <button
                            id="toggleRaiseColumn"
                            type="button"
                            aria-pressed="true"
                            class="inline-flex items-center justify-center rounded-2xl border border-white/10 bg-white/[0.08] px-4 py-3 text-sm font-medium text-textMain transition hover:bg-white/[0.12] focus:outline-none focus:ring-2 focus:ring-white/25">
                        Show After Raise Salary
                    </button>
                </div>
            </div>
        </div>

        <div class="grid gap-4 border-b border-white/10 px-6 py-5 sm:grid-cols-3 sm:px-8">
            <div class="rounded-2xl border border-white/10 bg-panelSoft px-4 py-4">
                <p class="text-[11px] uppercase tracking-[0.24em] text-textMuted">Employees</p>
                <p class="mt-2 text-2xl font-semibold text-textMain" th:text="${#lists.size(employees)}">0</p>
            </div>
            <div class="rounded-2xl border border-white/10 bg-panelSoft px-4 py-4">
                <p class="text-[11px] uppercase tracking-[0.24em] text-textMuted">Sorting</p>
                <p id="sortStatus" class="mt-2 text-lg font-semibold text-textMain">Default order</p>
            </div>
        </div>

        <div class="overflow-x-auto px-3 py-3 sm:px-5 sm:py-5">
            <table class="min-w-full border-separate border-spacing-y-3 text-left md:border-spacing-y-0">
                <thead class="hidden md:table-header-group">
                <tr class="text-[11px] uppercase tracking-[0.24em] text-textMuted">
                    <th class="px-4 py-3 font-medium">
                        <button type="button" data-sort-key="name" class="sort-trigger inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/[0.04] px-3 py-2 transition hover:border-white/20 hover:bg-white/[0.08]">
                            <span>Name</span>
                            <span class="sort-indicator text-xs text-bold">-</span>
                        </button>
                    </th>
                    <th class="px-4 py-3 font-medium">
                        <button type="button" data-sort-key="currentSalary" class="sort-trigger inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/[0.04] px-3 py-2 transition hover:border-white/20 hover:bg-white/[0.08]">
                            <span>Current Salary</span>
                            <span class="sort-indicator text-xs text-bold">-</span>
                        </button>
                    </th>
                    <th class="after-raise-column raise-column-cell raise-transition raise-hidden px-4 py-3 font-medium">
                        <button type="button" data-sort-key="afterRaiseSalary" class="sort-trigger inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/[0.04] px-3 py-2 transition hover:border-white/20 hover:bg-white/[0.08]">
                            <span>After Raise Salary</span>
                            <span class="sort-indicator text-xs text-bold">-</span>
                        </button>
                    </th>
                    <th class="px-4 py-3 font-medium">
                        <button type="button" data-sort-key="joinedDate" class="sort-trigger inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/[0.04] px-3 py-2 transition hover:border-white/20 hover:bg-white/[0.08]">
                            <span>Joined Date</span>
                            <span class="sort-indicator text-xs text-bold">-</span>
                        </button>
                    </th>
                    <th class="px-4 py-3 font-medium">Role</th>
                    <th class="px-4 py-3 font-medium">
                        <button type="button" data-sort-key="completion" class="sort-trigger inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/[0.04] px-3 py-2 transition hover:border-white/20 hover:bg-white/[0.08]">
                            <span>Completion</span>
                            <span class="sort-indicator text-xs text-bold">-</span>
                        </button>
                    </th>
                </tr>
                </thead>
                <tbody id="employeesTableBody">
                <tr th:each="employee, stat : ${employees}"
                    th:attr="data-name=${employee.name},
                             data-current-salary=${employee.currentSalary},
                             data-after-raise-salary=${employee.afterRaiseSalary},
                             data-joined-date=${employee.joinedDate},
                             data-completion=${employee.projectCompletionRate}"
                    class="group block rounded-2xl border border-white/10 bg-white/[0.03] transition-colors duration-200 hover:border-emerald-200/50 md:table-row md:rounded-none md:border-0">
                    <td th:classappend="${stat.odd} ? ' md:bg-white/[0.06]' : ' md:bg-white/[0.14]'"
                        class="desktop-row-cell row-edge-left block px-4 pb-2 pt-4 md:table-cell md:py-5">
                        <div class="text-[11px] uppercase tracking-[0.24em] text-textMuted md:hidden">Name</div>
                        <div class="font-medium text-textMain" th:text="${employee.name}">Name</div>
                    </td>
                    <td th:classappend="${stat.odd} ? ' md:bg-white/[0.06]' : ' md:bg-white/[0.14]'"
                        class="desktop-row-cell block px-4 py-2 md:table-cell md:py-5">
                        <div class="text-[11px] uppercase tracking-[0.24em] text-textMuted md:hidden">Current Salary</div>
                        <div class="text-textMain" th:text="${employee.currentSalary}">0.00</div>
                    </td>
                    <td th:classappend="${stat.odd} ? ' md:bg-white/[0.06]' : ' md:bg-white/[0.14]'"
                        class="desktop-row-cell after-raise-column raise-column-cell raise-transition raise-hidden block px-4 py-2 md:table-cell md:py-5">
                        <div class="text-[11px] uppercase tracking-[0.24em] text-textMuted md:hidden">After Raise Salary</div>
                        <div class="text-textMain" th:text="${employee.afterRaiseSalary}">0.00</div>
                    </td>
                    <td th:classappend="${stat.odd} ? ' md:bg-white/[0.06]' : ' md:bg-white/[0.14]'"
                        class="desktop-row-cell block px-4 py-2 md:table-cell md:py-5">
                        <div class="text-[11px] uppercase tracking-[0.24em] text-textMuted md:hidden">Joined Date</div>
                        <div class="text-textMain" th:text="${employee.joinedDate}">2026-01-01</div>
                    </td>
                    <td th:classappend="${stat.odd} ? ' md:bg-white/[0.06]' : ' md:bg-white/[0.14]'"
                        class="desktop-row-cell block px-4 py-2 md:table-cell md:py-5">
                        <div class="text-[11px] uppercase tracking-[0.24em] text-textMuted md:hidden">Role</div>
                        <span class="inline-flex rounded-full border border-white/10 bg-white/[0.08] px-3 py-1 text-xs font-medium tracking-wide text-accent"
                              th:text="${employee.role}">EMPLOYEE</span>
                    </td>
                    <td th:classappend="${stat.odd} ? ' md:bg-white/[0.06]' : ' md:bg-white/[0.14]'"
                        class="desktop-row-cell row-edge-right block px-4 pb-4 pt-2 md:table-cell md:py-5">
                        <div class="text-[11px] uppercase tracking-[0.24em] text-textMuted md:hidden">Completion</div>
                        <div class="flex items-center gap-3">
                            <div class="h-2 w-full max-w-36 overflow-hidden rounded-full bg-white/10">
                                <div class="h-full rounded-full bg-white/70"
                                     th:style="'width:' + (${employee.projectCompletionRate} * 100) + '%'"></div>
                            </div>
                            <span class="text-sm text-textMain"
                                  th:text="${#numbers.formatDecimal(employee.projectCompletionRate * 100, 1, 0)} + '%'">0%</span>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script>
    const toggleButton = document.getElementById("toggleRaiseColumn");
    const raiseColumns = document.querySelectorAll(".after-raise-column");
    const tableBody = document.getElementById("employeesTableBody");
    const sortButtons = document.querySelectorAll(".sort-trigger");
    const sortStatus = document.getElementById("sortStatus");
    let isHidden = true;
    let activeSort = { key: null, direction: "asc" };

    const sortValueReaders = {
        name: (row) => row.dataset.name.toLowerCase(),
        currentSalary: (row) => Number(row.dataset.currentSalary),
        afterRaiseSalary: (row) => Number(row.dataset.afterRaiseSalary),
        joinedDate: (row) => new Date(row.dataset.joinedDate).getTime(),
        completion: (row) => Number(row.dataset.completion)
    };

    function refreshRowShades() {
        Array.from(tableBody.querySelectorAll("tr")).forEach((row, index) => {
            const isOdd = index % 2 === 0;
            row.querySelectorAll("td").forEach((cell) => {
                cell.classList.remove("md:bg-white/[0.06]", "md:bg-white/[0.14]");
                cell.classList.add(isOdd ? "md:bg-white/[0.06]" : "md:bg-white/[0.14]");
            });
        });
    }

    function refreshSortIndicators() {
        sortButtons.forEach((button) => {
            const indicator = button.querySelector(".sort-indicator");
            if (button.dataset.sortKey !== activeSort.key) {
                indicator.textContent = "-";
                return;
            }

            indicator.textContent = activeSort.direction === "asc" ? "\u2191" : "\u2193";
        });
    }

    sortButtons.forEach((button) => {
        button.addEventListener("click", () => {
            const key = button.dataset.sortKey;
            const rows = Array.from(tableBody.querySelectorAll("tr"));
            const sameKey = activeSort.key === key;
            activeSort = {
                key,
                direction: sameKey && activeSort.direction === "asc" ? "desc" : "asc"
            };

            rows.sort((left, right) => {
                const leftValue = sortValueReaders[key](left);
                const rightValue = sortValueReaders[key](right);

                if (leftValue < rightValue) {
                    return activeSort.direction === "asc" ? -1 : 1;
                }

                if (leftValue > rightValue) {
                    return activeSort.direction === "asc" ? 1 : -1;
                }

                return 0;
            });

            rows.forEach((row) => tableBody.appendChild(row));
            refreshRowShades();
            refreshSortIndicators();
            sortStatus.textContent = `${button.innerText.trim().replace(/\s+/g, " ")} ${activeSort.direction === "asc" ? "ascending" : "descending"}`;
        });
    });

    toggleButton.addEventListener("click", () => {
        isHidden = !isHidden;

        raiseColumns.forEach((element) => {
            element.classList.toggle("raise-hidden", isHidden);
            element.classList.toggle("raise-visible", !isHidden);
            element.setAttribute("aria-hidden", String(isHidden));
        });

        toggleButton.textContent = isHidden ? "Show After Raise Salary" : "Hide After Raise Salary";
        toggleButton.setAttribute("aria-pressed", String(!isHidden));
    });

    refreshRowShades();
</script>
</body>
</html>
